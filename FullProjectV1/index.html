<!DOCTYPE html>
<html>
    <head>
        <title>Login Page</title>
        <link rel="stylesheet" href="style.css">
        <meta charset="UTF-8">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    </head>
    <body>
        <div class="Main-Container">
            <div class="Left-side-8-Column">
                <div class="login-Form">
                    <div class="Intro">
                        <h1>Welcome Back  👋</h1>
                        <h2>Today is a new day. It's your day. You shape it. Sign in to start managing your projects.</h2>
                    </div>
                    <div class="Form"">
                        <form action="email" method="post">
                            <p>Email</p>
                            <input type="email" required placeholder="Example@email.com">
                            <p>Password</p>
                            <input type="password" required placeholder="at least 8 characters ">
                            <!--<br>-->
                            <a href="../html/salam.html">Forgot Password?</a>
                            <button>Sign in</button>
                            
                        </form>
                    </div>
                    <div class="Social-Sign-in">
                        <div class="separator-Or">
                            <div class="line"></div>
                            <span class="text-separator">Or</span>
                            <div class="line"></div>
                        </div>
                        <div class="Social-buttons-columns">
                            <div>
                                
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="Art">
                <img src="image/Art.png" alt="Art">
            </div>
        </div>
    </body>
</html>
